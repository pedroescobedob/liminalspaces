;; Liminal Spaces - Device Profile Configuration
;; Platform-specific quality overrides

;; ============================================
;; iOS - Disable heavy features for mobile
;; ============================================
[IOS DeviceProfile]
DeviceType=IOS
+CVars=r.RayTracing=0
+CVars=r.PathTracing=0
+CVars=r.Lumen.HardwareRayTracing=0
+CVars=r.Nanite.ProjectEnabled=0
+CVars=r.Substrate=0
+CVars=r.Shadow.Virtual.Enable=0
+CVars=r.ShadowQuality=2
+CVars=r.Mobile.ShadingPath=1
+CVars=sg.ShadowQuality=2
+CVars=sg.TextureQuality=2
+CVars=sg.EffectsQuality=2
+CVars=sg.PostProcessQuality=2
+CVars=r.BloomQuality=3
+CVars=r.MaxAnisotropy=4
+CVars=r.ScreenPercentage=85
+CVars=r.MobileContentScaleFactor=1.0

;; ============================================
;; Android - Conservative settings
;; ============================================
[Android DeviceProfile]
DeviceType=Android
+CVars=r.RayTracing=0
+CVars=r.PathTracing=0
+CVars=r.Lumen.HardwareRayTracing=0
+CVars=r.Nanite.ProjectEnabled=0
+CVars=r.Substrate=0
+CVars=r.Shadow.Virtual.Enable=0
+CVars=r.ShadowQuality=1
+CVars=r.Mobile.ShadingPath=1
+CVars=sg.ShadowQuality=1
+CVars=sg.TextureQuality=1
+CVars=sg.EffectsQuality=1
+CVars=sg.PostProcessQuality=1
+CVars=r.BloomQuality=2
+CVars=r.MaxAnisotropy=2
+CVars=r.ScreenPercentage=75

;; ============================================
;; Windows - Full quality
;; ============================================
[Windows DeviceProfile]
DeviceType=Windows
+CVars=r.RayTracing=1
+CVars=r.Lumen.HardwareRayTracing=1
+CVars=r.Nanite.ProjectEnabled=1
+CVars=sg.ShadowQuality=4
+CVars=sg.TextureQuality=4
+CVars=sg.EffectsQuality=4
+CVars=sg.PostProcessQuality=4
+CVars=r.ScreenPercentage=100

;; ============================================
;; Mac - High quality, no RT on older Macs
;; ============================================
[Mac DeviceProfile]
DeviceType=Mac
+CVars=r.RayTracing=0
+CVars=r.Lumen.HardwareRayTracing=0
+CVars=r.Nanite.ProjectEnabled=1
+CVars=sg.ShadowQuality=3
+CVars=sg.TextureQuality=3
+CVars=sg.EffectsQuality=3
+CVars=sg.PostProcessQuality=3
+CVars=r.ScreenPercentage=100

;; ============================================
;; Console profiles
;; ============================================
[XboxSeriesX DeviceProfile]
DeviceType=XSX
+CVars=r.RayTracing=1
+CVars=r.Lumen.HardwareRayTracing=1
+CVars=r.Nanite.ProjectEnabled=1
+CVars=sg.ShadowQuality=4
+CVars=sg.TextureQuality=4

[PlayStation5 DeviceProfile]
DeviceType=PS5
+CVars=r.RayTracing=1
+CVars=r.Lumen.HardwareRayTracing=1
+CVars=r.Nanite.ProjectEnabled=1
+CVars=sg.ShadowQuality=4
+CVars=sg.TextureQuality=4

[NintendoSwitch DeviceProfile]
DeviceType=Switch
+CVars=r.RayTracing=0
+CVars=r.Nanite.ProjectEnabled=0
+CVars=r.Substrate=0
+CVars=sg.ShadowQuality=1
+CVars=sg.TextureQuality=2
+CVars=sg.EffectsQuality=1
+CVars=r.ScreenPercentage=70
